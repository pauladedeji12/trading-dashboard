
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMC Trading Dashboard v2 (Gemini Edition)</title>
    <style>
        :root {
            --bg: #f8f9fa; --card: #ffffff; --text: #212529; --gray: #868e96;
            --green: #0ca678; --red: #f03e3e; --blue: #228be6; --border: #e9ecef;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        
        /* Navigation */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; background: white; padding: 10px; border-radius: 10px; border: 1px solid var(--border); }
        .tab { flex: 1; padding: 10px; border: none; background: none; cursor: pointer; border-radius: 6px; font-weight: 500; color: var(--gray); transition: 0.2s; }
        .tab.active { background: #000; color: #fff; }

        .panel { display: none; }
        .panel.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* UI Components */
        .card { background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .stat { padding: 15px; background: var(--bg); border-radius: 8px; text-align: center; }
        .label { font-size: 11px; color: var(--gray); text-transform: uppercase; margin-bottom: 5px; }
        .val { font-size: 18px; font-weight: 700; }

        input, select, textarea { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; margin-top: 5px; font-size: 14px; }
        .btn { width: 100%; padding: 12px; background: #000; color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .signal-box { padding: 15px; border-radius: 8px; margin-top: 15px; border-left: 5px solid #000; }
        .long { background: #e6fcf5; border-color: var(--green); color: var(--green); }
        .short { background: #fff5f5; border-color: var(--red); color: var(--red); }
        .loader { text-align: center; font-size: 13px; color: var(--blue); padding: 10px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="card" style="background: #e7f5ff; border-color: #a5d8ff;">
        <h4 style="font-size: 14px;">🔑 Gemini API Config (Free)</h4>
        <input type="password" id="api-key" placeholder="Paste Gemini API Key here...">
        <p style="font-size: 10px; color: #4dabf7; margin-top: 5px;">Your key is stored only in your browser's memory.</p>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="showTab('analysis')">SMC Analyzer</button>
        <button class="tab" onclick="showTab('sizer')">Position Size</button>
        <button class="tab" onclick="showTab('journal')">Journal</button>
    </div>

    <div id="analysis" class="panel active">
        <div class="card">
            <div style="display: flex; gap: 10px;">
                <select id="symbol"><option value="BTCUSDT">BTC/USDT</option><option value="ETHUSDT">ETH/USDT</option><option value="SOLUSDT">SOL/USDT</option></select>
                <select id="tf"><option value="15m">15m</option><option value="1h" selected>1H</option><option value="4h">4H</option></select>
            </div>
            <button class="btn" id="runBtn" onclick="startAnalysis()">Start SMC Analysis</button>
            <div id="loader" class="loader">Scanning Smart Money Liquidity...</div>
        </div>

        <div id="results" style="display:none;">
            <div class="grid">
                <div class="stat"><div class="label">Price</div><div class="val" id="res-price">--</div></div>
                <div class="stat"><div class="label">Structure</div><div class="val" id="res-struct">--</div></div>
                <div class="stat"><div class="label">Trend</div><div class="val" id="res-trend">--</div></div>
            </div>

            <div id="ai-box" class="signal-box">
                <h3 id="ai-dir">ANALYZING...</h3>
                <p id="ai-reason" style="font-size: 13px; margin-top: 5px;"></p>
                <div class="grid" style="margin-top: 10px;">
                    <div><small>Entry</small><div id="ai-entry">--</div></div>
                    <div><small>SL</small><div id="ai-sl">--</div></div>
                    <div><small>TP</small><div id="ai-tp">--</div></div>
                </div>
            </div>
        </div>
    </div>

    <div id="sizer" class="panel">
        <div class="card">
            <h3>Risk Calculator</h3>
            <label>Balance (USDT)</label><input type="number" id="s-bal" value="1000">
            <label>Risk %</label><input type="number" id="s-risk" value="1">
            <label>Entry Price</label><input type="number" id="s-entry">
            <label>Stop Loss Price</label><input type="number" id="s-sl">
            <button class="btn" onclick="calcSize()">Calculate</button>
            <div id="size-res" style="margin-top:20px; font-size: 20px; font-weight:800; text-align:center; display:none;"></div>
        </div>
    </div>

    <div id="journal" class="panel">
        <div class="card">
            <h3>Log Trade</h3>
            <input type="text" id="j-pair" placeholder="Pair">
            <select id="j-res"><option value="Win">Win</option><option value="Loss">Loss</option></select>
            <input type="number" id="j-pnl" placeholder="P&L ($)">
            <button class="btn" onclick="saveTrade()">Save to Browser</button>
        </div>
        <div id="journal-list"></div>
    </div>
</div>

<script>
    // Tab Logic
    function showTab(id) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // High-Resilience Fetching
    async function fetchMarketData(symbol, tf) {
        const url = `https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${tf}&limit=50`;
        const proxies = [
            `https://corsproxy.io/?${encodeURIComponent(url)}`,
            `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`
        ];

        for (let p of proxies) {
            try {
                let r = await fetch(p);
                let d = await r.json();
                // Allorigins wrapper check
                return d.contents ? JSON.parse(d.contents) : d;
            } catch (e) { continue; }
        }
        throw new Error("Market data unavailable. Check connection.");
    }

    // Structure Detection (SMC)
    function analyzeSMC(data) {
        const highs = data.map(c => parseFloat(c[2]));
        const lows = data.map(c => parseFloat(c[3]));
        const currentH = highs[highs.length-1];
        const prevH = highs[highs.length-5];
        const currentL = lows[lows.length-1];
        const prevL = lows[lows.length-5];

        if (currentH > prevH && currentL > prevL) return { s: "HH/HL", t: "BULLISH" };
        if (currentH < prevH && currentL < prevL) return { s: "LH/LL", t: "BEARISH" };
        return { s: "CHoCH", t: "RANGING" };
    }

    async function startAnalysis() {
        const key = document.getElementById('api-key').value;
        const loader = document.getElementById('loader');
        const btn = document.getElementById('runBtn');
        
        btn.disabled = true; loader.style.display = 'block';

        try {
            const symbol = document.getElementById('symbol').value;
            const tf = document.getElementById('tf').value;
            const data = await fetchMarketData(symbol, tf);
            const smc = analyzeSMC(data);
            const price = data[data.length-1][4];

            document.getElementById('res-price').innerText = `$${parseFloat(price).toLocaleString()}`;
            document.getElementById('res-struct').innerText = smc.s;
            document.getElementById('res-trend').innerText = smc.t;
            document.getElementById('results').style.display = 'block';

            if (!key) {
                document.getElementById('ai-reason').innerText = "⚠️ Enter Gemini API Key to unlock AI Signal.";
                return;
            }

            // Gemini API Call
            const prompt = `SMC Analysis: Pair ${symbol}, Price ${price}, Structure ${smc.s}, Trend ${smc.t}. Return ONLY JSON: {"dir":"LONG/SHORT", "reason":"...", "entry":${price}, "sl":0, "tp":0}`;
            
            const aiResp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: 'POST',
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const aiData = await aiResp.json();
            const cleanJson = aiData.candidates[0].content.parts[0].text.replace(/```json|```/g, "");
            const signal = JSON.parse(cleanJson);

            const box = document.getElementById('ai-box');
            box.className = `signal-box ${signal.dir.toLowerCase()}`;
            document.getElementById('ai-dir').innerText = signal.dir + " SIGNAL";
            document.getElementById('ai-reason').innerText = signal.reason;
            document.getElementById('ai-entry').innerText = signal.entry;
            document.getElementById('ai-sl').innerText = signal.sl;
            document.getElementById('ai-tp').innerText = signal.tp;

        } catch (err) {
            alert(err.message);
        } finally {
            btn.disabled = false; loader.style.display = 'none';
        }
    }

    // Position Sizer
    function calcSize() {
        const bal = document.getElementById('s-bal').value;
        const risk = document.getElementById('s-risk').value / 100;
        const entry = document.getElementById('s-entry').value;
        const sl = document.getElementById('s-sl').value;
        
        const amount = (bal * risk) / (Math.abs(entry - sl) / entry);
        const res = document.getElementById('size-res');
        res.innerText = `Position Size: $${amount.toFixed(2)}`;
        res.style.display = 'block';
    }

    // Journal Logic
    let trades = JSON.parse(localStorage.getItem('trades')) || [];
    function saveTrade() {
        const t = { p: document.getElementById('j-pair').value, r: document.getElementById('j-res').value, v: document.getElementById('j-pnl').value };
        trades.push(t);
        localStorage.setItem('trades', JSON.stringify(trades));
        renderJournal();
    }
    function renderJournal() {
        document.getElementById('journal-list').innerHTML = trades.reverse().map(t => `
            <div class="card" style="border-left: 4px solid ${t.r === 'Win' ? 'var(--green)' : 'var(--red)'}">
                <b>${t.p}</b>: ${t.r} ($${t.v})
            </div>
        `).join('');
    }
    renderJournal();
</script>
</body>
</html>
